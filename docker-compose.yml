services:
  app:
    container_name: katachi-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Loopback only — host nginx reverse-proxies to this. Not exposed to the internet.
      # Host port 3500 matches the existing nginx config for katachi.lasseharm.space
      # (proxy_pass http://localhost:3500); container still listens on 3000 internally.
      - "127.0.0.1:3500:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    # Joins mailcow's network so the app reaches its postfix container directly
    # (container-to-container, like db/redis). Going via the host is blocked by
    # the host firewall, and the public hostname hairpins. The app connects with
    # SMTP_HOST=postfix-mailcow, resolved by Docker DNS on this network.
    volumes:
      - ./data:/app/data
    networks:
      - katachi_network
      - mailcow-network
    depends_on:
      - db
      - redis

  # Database service (PostgreSQL for storing notes and user data)
  db:
    container_name: katachi-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: katachi
      POSTGRES_PASSWORD: katachi_password
      POSTGRES_DB: katachi_db
    # No host port published — reachable only inside katachi_network as "db:5432".
    volumes:
      - katachi_postgres_data:/var/lib/postgresql/data
    networks:
      - katachi_network
    restart: unless-stopped

  # Redis for caching and real-time features
  redis:
    container_name: katachi-redis
    image: redis:7-alpine
    # No host port published — reachable only inside katachi_network as "redis:6379".
    volumes:
      - katachi_redis_data:/data
    networks:
      - katachi_network
    restart: unless-stopped

volumes:
  katachi_postgres_data:
  katachi_redis_data:

networks:
  katachi_network:
    driver: bridge
  # mailcow's network, created by the mailcow-dockerized stack. Joining it lets
  # the app reach the postfix container directly (bypasses the host firewall).
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network
